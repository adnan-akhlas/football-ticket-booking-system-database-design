services:
  postgres:
    image: postgres:18
    container_name: football_sys
    restart: unless-stopped

    environment:
      POSTGRES_USER: football_sys
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: football_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
